<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSA Visualizer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d0f14;
        --bg2: #151820;
        --bg3: #1c1f2a;
        --border: #2a2d3a;
        --border2: #353848;
        --text: #e8eaf2;
        --text2: #8b8fa8;
        --text3: #555870;

        --teal: #00d4aa;
        --teal-bg: rgba(0, 212, 170, 0.12);
        --teal-brd: rgba(0, 212, 170, 0.35);

        --amber: #f5a623;
        --amber-bg: rgba(245, 166, 35, 0.12);
        --amber-brd: rgba(245, 166, 35, 0.35);

        --purple: #9b8cff;
        --purple-bg: rgba(155, 140, 255, 0.12);
        --purple-brd: rgba(155, 140, 255, 0.35);

        --red: #ff5f6d;
        --red-bg: rgba(255, 95, 109, 0.1);
        --red-brd: rgba(255, 95, 109, 0.3);

        --green: #4ade80;
        --green-bg: rgba(74, 222, 128, 0.1);

        --radius: 12px;
        --radius-lg: 18px;
        --mono: "IBM Plex Mono", monospace;
        --sans: "Tajawal", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 40px;
        border-bottom: 1px solid var(--border);
        background: var(--bg2);
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .logo-icon {
        width: 42px;
        height: 42px;
        background: var(--teal-bg);
        border: 1px solid var(--teal-brd);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo-icon svg {
        width: 22px;
        height: 22px;
      }
      .logo-text h1 {
        font-family: var(--mono);
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.3px;
      }
      .logo-text p {
        font-size: 13px;
        color: var(--text2);
        margin-top: 1px;
      }
      .mode-switch {
        display: flex;
        gap: 0;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 4px;
      }
      .mode-btn {
        padding: 8px 22px;
        border-radius: 7px;
        border: none;
        background: transparent;
        color: var(--text2);
        font-family: var(--mono);
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .mode-btn.active {
        background: var(--teal-bg);
        color: var(--teal);
        border: 1px solid var(--teal-brd);
      }

      .nav-menu {
        display: flex;
        gap: 20px;
        margin: auto;
      }
      .nav-link {
        color: var(--text2);
        text-decoration: none;
        font-family: var(--mono);
        font-size: 14px;
        padding: 8px 16px;
        border-radius: 8px;
        transition: all 0.2s;
      }
      .nav-link:hover {
        background: var(--bg3);
        color: var(--text);
      }
      .nav-link.active {
        background: var(--teal-bg);
        color: var(--teal);
        border: 1px solid var(--teal-brd);
      }

      /* ── Layout ── */
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 340px;
        grid-template-rows: auto 1fr auto;
        gap: 0;
        padding: 32px 40px;
        gap: 28px;
      }

      /* ── Stats row ── */
      .stats-row {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 16px;

        justify-content: center; /* التوسيط أفقيًا */
        /* التوسيط عموديًا */
      }
      .stat-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 22px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        transition: border-color 0.2s;
      }
      .stat-card:hover {
        border-color: var(--border2);
      }
      .stat-label {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .stat-value {
        font-family: var(--mono);
        font-size: 28px;
        font-weight: 600;
        color: var(--text);
        line-height: 1;
      }
      .stat-value.teal {
        color: var(--teal);
      }
      .stat-value.amber {
        color: var(--amber);
      }
      .stat-value.purple {
        color: var(--purple);
      }
      .stat-value.red {
        color: var(--red);
      }
      .stat-value.green {
        color: var(--green);
      }

      /* ── Queue canvas ── */
      .queue-panel {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 24px;
        border-bottom: 1px solid var(--border);
      }
      .panel-title {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--text2);
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .panel-title span {
        color: var(--teal);
      }
      .flow-labels {
        display: flex;
        justify-content: space-between;
        padding: 10px 24px 0;
        font-family: var(--mono);
        font-size: 12px;
      }
      .lbl-front {
        color: var(--purple);
      }
      .lbl-rear {
        color: var(--amber);
      }

      .queue-stage {
        flex: 1;
        display: flex;
        align-items: center;
        padding: 28px 24px;
        gap: 12px;
        overflow-x: auto;
        min-height: 200px;
        scrollbar-width: thin;
        scrollbar-color: var(--border2) transparent;
      }
      .queue-stage::-webkit-scrollbar {
        height: 4px;
      }
      .queue-stage::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 2px;
      }

      .empty-state {
        margin: auto;
        text-align: center;
        color: var(--text3);
      }
      .empty-state .em-icon {
        font-size: 48px;
        display: block;
        margin-bottom: 12px;
        opacity: 0.4;
        font-family: var(--mono);
        font-weight: 600;
        color: var(--text2);
        letter-spacing: -2px;
      }
      .empty-state p {
        font-size: 15px;
      }

      /* ── Queue nodes ── */
      .q-node-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .q-node {
        width: 96px;
        height: 96px;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        font-family: var(--mono);
        border: 2px solid;
        cursor: default;
        position: relative;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }
      .q-node:hover {
        transform: translateY(-3px);
      }
      .q-node.normal {
        background: rgba(139, 143, 168, 0.08);
        border-color: var(--border2);
        color: var(--text);
      }
      .q-node.front {
        background: var(--purple-bg);
        border-color: var(--purple);
        color: var(--purple);
        box-shadow: 0 0 24px rgba(155, 140, 255, 0.2);
      }
      .q-node.rear {
        background: var(--amber-bg);
        border-color: var(--amber);
        color: var(--amber);
        box-shadow: 0 0 24px rgba(245, 166, 35, 0.2);
      }
      .q-node.front.rear {
        background: var(--teal-bg);
        border-color: var(--teal);
        color: var(--teal);
        box-shadow: 0 0 24px rgba(0, 212, 170, 0.2);
      }
      .q-node .val {
        font-size: 22px;
        font-weight: 600;
        line-height: 1;
      }
      .q-node .idx {
        font-size: 11px;
        opacity: 0.6;
      }
      .q-label {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
        padding: 3px 10px;
        border-radius: 5px;
        letter-spacing: 0.5px;
      }
      .q-label.front {
        background: var(--purple-bg);
        color: var(--purple);
        border: 1px solid var(--purple-brd);
      }
      .q-label.rear {
        background: var(--amber-bg);
        color: var(--amber);
        border: 1px solid var(--amber-brd);
      }
      .q-label.both {
        background: var(--teal-bg);
        color: var(--teal);
        border: 1px solid var(--teal-brd);
      }
      .q-label.mid {
        opacity: 0;
      }

      .arr-sep {
        font-family: var(--mono);
        font-size: 22px;
        color: var(--border2);
        flex-shrink: 0;
        padding-bottom: 40px;
        user-select: none;
      }

      /* Animations */
      @keyframes nodeIn {
        from {
          opacity: 0;
          transform: translateX(40px) scale(0.8);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes nodeOut {
        to {
          opacity: 0;
          transform: translateX(-40px) scale(0.8);
        }
      }
      @keyframes nodePulse {
        0%,
        100% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.12);
        }
      }
      @keyframes nodeShake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-6px);
        }
        75% {
          transform: translateX(6px);
        }
      }

      .anim-in {
        animation: nodeIn 0.35s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
      }
      .anim-out {
        animation: nodeOut 0.3s ease-in forwards;
      }
      .anim-pulse {
        animation: nodePulse 0.45s ease-in-out;
      }
      .anim-shake {
        animation: nodeShake 0.3s ease-in-out;
      }

      /* ── Side panel ── */
      .side-col {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* Controls */
      .ctrl-panel {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 22px;
      }
      .ctrl-title {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text3);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      .inp-row {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
      }
      input[type="text"] {
        flex: 1;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 9px;
        color: var(--text);
        font-family: var(--mono);
        font-size: 16px;
        padding: 0 14px;
        height: 48px;
        outline: none;
        transition: border-color 0.2s;
        direction: ltr;
      }
      input[type="text"]:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }
      input[type="text"]::placeholder {
        color: var(--text3);
        font-size: 14px;
      }

      .btn-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .op-btn {
        height: 48px;
        border-radius: 10px;
        border: 1px solid;
        font-family: var(--mono);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.15s;
        letter-spacing: 0.3px;
      }
      .op-btn:hover {
        filter: brightness(1.15);
      }
      .op-btn:active {
        transform: scale(0.96);
      }

      .btn-enq {
        background: var(--teal-bg);
        border-color: var(--teal-brd);
        color: var(--teal);
      }
      .btn-deq {
        background: var(--amber-bg);
        border-color: var(--amber-brd);
        color: var(--amber);
      }
      .btn-peek {
        background: var(--purple-bg);
        border-color: var(--purple-brd);
        color: var(--purple);
      }
      .btn-rnd {
        background: rgba(74, 222, 128, 0.1);
        border-color: rgba(74, 222, 128, 0.3);
        color: var(--green);
      }
      .btn-clr {
        background: var(--red-bg);
        border-color: var(--red-brd);
        color: var(--red);
        grid-column: span 2;
      }

      /* ── Linked list panel ── */
      .ll-panel {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 22px;
      }
      .ll-panel-title {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text3);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      .ll-track {
        display: flex;
        align-items: center;
        gap: 0;
        overflow-x: auto;
        padding: 4px 0 8px;
        scrollbar-width: thin;
        scrollbar-color: var(--border2) transparent;
      }
      .ll-track::-webkit-scrollbar {
        height: 3px;
      }
      .ll-track::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 2px;
      }
      .ll-node-box {
        display: flex;
        border: 1px solid var(--border2);
        border-radius: 8px;
        overflow: hidden;
        font-family: var(--mono);
        font-size: 13px;
        flex-shrink: 0;
        height: 44px;
        background: var(--bg3);
      }
      .ll-data {
        padding: 0 14px;
        display: flex;
        align-items: center;
        font-weight: 600;
        color: var(--text);
        border-right: 1px solid var(--border2);
        min-width: 48px;
        justify-content: center;
      }
      .ll-ptr {
        padding: 0 10px;
        display: flex;
        align-items: center;
        font-size: 11px;
        color: var(--text3);
      }
      .ll-arrow-line {
        width: 24px;
        height: 2px;
        background: var(--border2);
        position: relative;
        flex-shrink: 0;
        align-self: center;
        margin: 0 1px;
      }
      .ll-arrow-line::after {
        content: "";
        position: absolute;
        right: -1px;
        top: -4px;
        border-left: 7px solid var(--border2);
        border-top: 4px solid transparent;
        border-bottom: 4px solid transparent;
      }
      .ll-null {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--text3);
        padding: 0 8px;
        align-self: center;
      }
      .ll-ptr-row {
        display: flex;
        gap: 14px;
        margin-top: 12px;
        font-family: var(--mono);
        font-size: 12px;
      }
      .ptr-tag {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--text2);
      }
      .ptr-pip {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .front-pip {
        background: var(--purple);
      }
      .rear-pip {
        background: var(--amber);
      }

      /* ── Log ── */
      .log-panel {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .log-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
      }
      .log-hdr-title {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text3);
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .log-clr-btn {
        background: none;
        border: none;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text3);
        cursor: pointer;
        transition: color 0.15s;
      }
      .log-clr-btn:hover {
        color: var(--red);
      }
      .log-body {
        overflow-y: auto;
        flex: 1;
        max-height: 260px;
        padding: 8px 0;
        scrollbar-width: thin;
        scrollbar-color: var(--border2) transparent;
      }
      .log-body::-webkit-scrollbar {
        width: 3px;
      }
      .log-body::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 2px;
      }
      .log-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 18px;
        font-family: var(--mono);
        font-size: 13px;
        transition: background 0.1s;
      }
      .log-row:hover {
        background: rgba(255, 255, 255, 0.03);
      }
      .log-pip {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .p-enq {
        background: var(--teal);
      }
      .p-deq {
        background: var(--amber);
      }
      .p-peek {
        background: var(--purple);
      }
      .p-err {
        background: var(--red);
      }
      .p-info {
        background: var(--text3);
      }
      .log-msg {
        color: var(--text2);
        flex: 1;
      }
      .log-msg .hi {
        color: var(--text);
        font-weight: 500;
      }
      .log-ts {
        color: var(--text3);
        font-size: 11px;
        flex-shrink: 0;
      }

      /* ── Bottom code strip ── */
      .code-strip {
        grid-column: 1 / -1;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 24px;
        font-family: var(--mono);
        font-size: 14px;
        color: var(--text2);
        display: flex;
        align-items: center;
        gap: 16px;
        overflow-x: auto;
      }
      .code-strip .kw {
        color: var(--purple);
      }
      .code-strip .fn {
        color: var(--teal);
      }
      .code-strip .val {
        color: var(--amber);
      }
      .code-strip .cm {
        color: var(--text3);
      }
      .code-strip .sep {
        color: var(--border2);
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 10px;
        padding: 12px 24px;
        font-family: var(--mono);
        font-size: 14px;
        color: var(--text);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.2s,
          transform 0.2s;
        z-index: 999;
        white-space: nowrap;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .toast.err {
        border-color: var(--red-brd);
        color: var(--red);
      }
      .toast.peek {
        border-color: var(--purple-brd);
        color: var(--purple);
      }
      .hero-image-container {
        grid-column: 1 / -1; /* لجعل الحاوية تأخذ عرض الصفحة كاملاً */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px;
        background: var(--bg2); /* استخدام نفس لون الخلفية في الكود */
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        margin-bottom: 20px;
        position: relative;
        overflow: hidden;
      }

      .centered-img {
        width: 60%; /* تجعل الصورة تأخذ 80% من عرض الحاوية */
        height: auto; /* تحافظ على أبعاد الصورة الأصلية (تناسب الطول مع العرض) */
        display: block;
        margin: 0 auto; /* تضمن بقاءها في المنتصف */
        max-width: 100%;
        height: auto;
        border-radius: var(--radius);
        /* إضافة توهج (Glow) خفيف حول الصورة ليناسب طابع الـ Dark Mode */
        box-shadow: 0 0 40px rgba(0, 212, 170, 0.15);
        transition: transform 0.3s ease;
        margin-bottom: 50px;
      }

      .centered-img:hover {
        transform: scale(1.02); /* تأثير تكبير بسيط عند المرور بالماوس */
      }

      .overlay-text {
        margin-top: 20px;
        font-family: var(--mono);
        color: var(--teal);
        font-size: 1.2rem;
        font-weight: 500;
      }
      /* مثال لتحريك الأيقونة في المنتصف */
      .hero-icon-big {
        width: 150px;
        height: 150px;
        filter: drop-shadow(0 0 15px var(--teal));
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">
          <svg
            viewBox="0 0 24 24"
